name: 🐛 Bug report
description: Something doesn't work the way the docs (or your gut) say it should.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. **The more specific your repro, the faster this gets fixed.**
        If you can paste a 3-line shell command that reproduces it, that's gold.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Concise description of the bug — one paragraph max.
      placeholder: e.g. "pinned init --auto crashed with a stack trace when run in a fresh tempdir with no git history."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: e.g. "Init should detect there's no commit yet and either skip or print a clear error."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Shell commands ideal. The more deterministic, the better.
      placeholder: |
        ```bash
        mkdir /tmp/repro && cd /tmp/repro
        npx pinnedai@latest init --auto
        ```
      render: bash
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output (paste the full stack trace or terminal output)
      render: shell
    validations:
      required: false

  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      description: Where did you encounter the bug?
      options:
        - CLI (npx pinnedai / npm pinnedai)
        - VS Code / Cursor / Windsurf extension
        - GitHub Action
        - MCP server (pinnedai-mcp)
        - Pre-commit hook (Guard Integrity)
        - Other (please describe in "What happened")
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Pinned version
      description: Output of `npx pinnedai --version` (or extension version from your editor).
      placeholder: e.g. "0.1.0" or "extension 0.1.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS + Node version
      description: Output of `node --version && uname -a` (or your OS name on Windows).
      placeholder: e.g. "Node 20.18.0, macOS 15.5, arm64"
    validations:
      required: true

  - type: textarea
    id: workaround
    attributes:
      label: Any workaround you found?
      description: If you got past it somehow, knowing how helps prioritize.
    validations:
      required: false
